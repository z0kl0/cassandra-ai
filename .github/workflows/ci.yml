name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        # The deterministic forensic engine + its test suite only need pandas/numpy. The LLM
        # (Ollama), vector store (Chroma/torch) and Streamlit UI require a local runtime and are
        # not unit-tested in CI, so we skip those heavy deps to keep CI fast and reliable.
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy python-dotenv pytest flake8

      - name: Lint (syntax errors + undefined names)
        run: flake8 --max-line-length=140 --select=E9,F --exclude=.venv,data .

      - name: Run forensic test suite (offline)
        # Live SEC tests are marked @pytest.mark.live and skipped without --run-live.
        run: pytest -q
